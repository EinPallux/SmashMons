# SmashMons Augments Configuration
# ===================================
# Augments are passive effects chosen between rounds.
# Types: STAT_BOOST, AURA, ON_HIT, ON_KILL, ON_DEATH, PASSIVE
# Each round, 3 random augments are chosen from this pool.

augments:
  iron_will:
    display-name: "&#8888FF&lIron Will"
    description: "Gain 2 extra hearts of max health."
    material: IRON_INGOT
    type: STAT_BOOST
    extra-health: 4.0

  swift_strikes:
    display-name: "&#FFDD44&lSwift Strikes"
    description: "Deal 15% more damage with all attacks."
    material: GOLDEN_SWORD
    type: STAT_BOOST
    damage-multiplier: 1.15

  wind_resistance:
    display-name: "&#88DDFF&lWind Resistance"
    description: "Take 25% less knockback."
    material: FEATHER
    type: STAT_BOOST
    knockback-reduction: 0.25

  spike_aura:
    display-name: "&#FF4444&lSpike Aura"
    description: "Reflect 20% of damage taken back to the attacker."
    material: PRISMARINE_CRYSTALS
    type: AURA
    reflect-percent: 0.20

  glass_cannon:
    display-name: "&#FF6644&lGlass Cannon"
    description: "Deal 30% more damage but take 15% more damage."
    material: GLASS
    type: STAT_BOOST
    damage-multiplier: 1.30
    damage-taken-multiplier: 1.15

  vampiric_touch:
    display-name: "&#AA0044&lVampiric Touch"
    description: "Heal 1 heart for every 2 damage you deal."
    material: REDSTONE
    type: ON_HIT
    heal-per-damage: 0.5

  lightning_reflexes:
    display-name: "&#FFFF44&lLightning Reflexes"
    description: "Reduce all ability cooldowns by 20%."
    material: LIGHTNING_ROD
    type: STAT_BOOST
    cooldown-reduction: 0.20

  adrenaline:
    display-name: "&#FF8844&lAdrenaline"
    description: "After killing a player, gain Speed II for 4 seconds."
    material: SUGAR
    type: ON_KILL
    speed-amplifier: 1
    speed-duration-ticks: 80

  stone_skin:
    display-name: "&#AAAAAA&lStone Skin"
    description: "Gain permanent Resistance I."
    material: STONE
    type: PASSIVE
    effect: RESISTANCE
    amplifier: 0

  double_jump_master:
    display-name: "&#44FFDD&lDouble Jump Master"
    description: "Reduce double jump cooldown by 1 second."
    material: RABBIT_FOOT
    type: STAT_BOOST
    double-jump-cooldown-reduction: 1

  energy_surge:
    display-name: "&#DD44FF&lEnergy Surge"
    description: "Regenerate energy 25% faster (for Energy-type kits)."
    material: AMETHYST_SHARD
    type: STAT_BOOST
    energy-regen-bonus: 0.25

  final_stand:
    display-name: "&#FF2222&lFinal Stand"
    description: "When you fall below 4 HP, gain Strength I for 5 seconds (once per round)."
    material: TOTEM_OF_UNDYING
    type: PASSIVE
    threshold-health: 4.0
    strength-amplifier: 0
    strength-duration-ticks: 100

  phantom_step:
    display-name: "&#AAAAAA&lPhantom Step"
    description: "Gain Invisibility for 2 seconds after using an ability."
    material: SPECTRAL_ARROW
    type: ON_HIT
    invis-duration-ticks: 40

  berserker:
    display-name: "&#CC2200&lBerserker"
    description: "Each kill this round permanently increases your damage by 5%."
    material: NETHERITE_SWORD
    type: ON_KILL
    damage-bonus-per-kill: 0.05
