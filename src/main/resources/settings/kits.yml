# SmashMons Kits Configuration
# ==============================
# type: COOLDOWN or ENERGY
# All kits with type ENERGY have a 100-unit energy bar (BossBar).
# Cooldowns are in seconds. Energy costs are 0-100.
#
# BALANCE REFERENCE (1 HP = half a heart in Minecraft):
#   Pig     20 HP  — brawler, close-range explosive
#   Skeleton 20 HP — ranged archer, poke damage
#   Blaze   18 HP  — energy-based burst mage, fire DoT
#   Creeper 22 HP  — beefy bruiser, stealth/trap

kits:
  pig:
    display-name: "&#FFB3C6&lPig"
    lore:
      - "&#FFB3C6A bouncy, explosive pork powerhouse."
      - ""
      - "&#FFB3C6Speed: &#FFFFFF+10%"
      - "&#FFB3C6Health: &#FFFFFF20 HP"
    material: PORKCHOP
    mob: PIG
    health: 20.0
    speed-bonus: 0.1
    unlocked-by-default: true
    cost: 0
    type: COOLDOWN
    abilities:
      primary:
        name: "Bouncy Bacon"
        description: "Throws a porkchop that bounces up to 5 times, dealing damage on each hit."
        material: PORKCHOP
        cooldown: 7
        # Each hit deals this much BEFORE the bounce multiplier is applied.
        # At 1.0× it deals 9.0 on first hit → 7.65 → 6.5 → 5.5 → 4.7
        damage: 9.0
        bounces: 5
        bounce-damage-multiplier: 0.85
      secondary:
        name: "Pigplosion"
        description: "Spawns a speedy Baby Pig that chases enemies and explodes after 4 seconds."
        material: FLINT_AND_STEEL
        cooldown: 14
        explosion-damage: 14.0
        fuse-seconds: 4
        pig-speed: 0.65
      ultimate:
        name: "Bacon Bonanza"
        description: "Rains porkchops from the sky in a 10-block radius for 5 seconds. Each one explodes on impact!"
        cooldown: 0
        duration-seconds: 5
        radius: 10
        damage-per-hit: 8.0
        explosion-radius: 2.5
        slow-duration-ticks: 80
        slow-amplifier: 1

  skeleton:
    display-name: "&#E0E0E0&lSkeleton"
    lore:
      - "&#E0E0E0A precise bone archer with deadly marksmanship."
      - ""
      - "&#E0E0E0Health: &#FFFFFF20 HP"
    material: BONE
    mob: SKELETON
    health: 20.0
    speed-bonus: 0.0
    unlocked-by-default: true
    cost: 0
    type: COOLDOWN
    abilities:
      primary:
        name: "Volley"
        description: "Fires a burst of 5 arrows in a spread, each dealing 4.5 damage."
        material: ARROW
        cooldown: 9
        arrow-count: 5
        # Each arrow: 4.5 damage → 5 arrows = 22.5 max but spread means ~2-3 land
        damage: 4.5
        spread: 0.18
      secondary:
        name: "Bone Shield"
        description: "Grants a temporary shield of 6 absorption hearts for 5 seconds."
        material: SHIELD
        cooldown: 18
        absorption-hearts: 6
        duration-ticks: 100
      ultimate:
        name: "Rain of Bones"
        description: "Summons a bone-arrow barrage in an 8-block radius for 4 seconds."
        cooldown: 0
        duration-seconds: 4
        radius: 8
        arrows-per-tick: 3
        # Each arrow 4.0 damage; 3 arrows per 5-tick interval
        damage: 4.0

  blaze:
    display-name: "&#FF6B00&lBlaze"
    lore:
      - "&#FF6B00A fiery elemental that burns everything in its path."
      - ""
      - "&#FF6B00Health: &#FFFFFF18 HP"
      - "&#FF6B00Fire Immunity: &#FFFFFFTrue"
    material: BLAZE_ROD
    mob: BLAZE
    health: 18.0
    speed-bonus: 0.05
    unlocked-by-default: true
    cost: 0
    type: ENERGY
    energy-regen-per-second: 9
    abilities:
      primary:
        name: "Fireball Barrage"
        description: "Launches 3 fireballs that each deal 6 damage and set enemies ablaze."
        material: FIRE_CHARGE
        energy-cost: 25
        fireball-count: 3
        # 6 base × 3 fireballs = 18 max if all land (rare at range)
        damage: 6.0
        fire-ticks: 60
        delay-between-ticks: 4
      secondary:
        name: "Flame Surge"
        description: "Blasts yourself upward in a pillar of flame, scorching nearby enemies."
        material: BLAZE_POWDER
        energy-cost: 35
        # Hits everyone in 3-block radius — AoE, so moderate per-target
        damage: 7.0
        launch-velocity: 1.1
        burn-radius: 3.5
        fire-ticks: 50
      ultimate:
        name: "Inferno"
        description: "Erupts in a ring of 12 fireballs that radiate outward, each dealing 7 damage."
        cooldown: 0
        energy-cost: 0
        radius: 6
        fireball-count: 12
        # 7 per fireball; players should get hit by 1-2 realistically
        damage: 7.0
        fire-ticks: 80

  creeper:
    display-name: "&#44FF44&lCreeper"
    lore:
      - "&#44FF44The explosive infiltrator. Silent and deadly."
      - ""
      - "&#44FF44Health: &#FFFFFF22 HP"
      - "&#44FF44SSSSS..."
    material: GUNPOWDER
    mob: CREEPER
    health: 22.0
    speed-bonus: 0.05
    unlocked-by-default: false
    cost: 500
    type: COOLDOWN
    abilities:
      primary:
        name: "Shock Charge"
        description: "Charges forward and stuns the first enemy hit, dealing 7 damage."
        material: GUNPOWDER
        cooldown: 7
        damage: 7.0
        dash-velocity: 1.5
        stun-ticks: 35
      secondary:
        name: "Proximity Mine"
        description: "Plants a hidden mine that detonates when an enemy walks over it."
        material: TNT
        cooldown: 16
        damage: 10.0
        trigger-radius: 1.5
        mine-lifetime-seconds: 30
      ultimate:
        name: "Supercharge"
        description: "Becomes a Charged Creeper and detonates in a massive explosion after 2 seconds."
        cooldown: 0
        fuse-ticks: 40
        damage: 16.0
        explosion-radius: 6
        self-damage-factor: 0.15