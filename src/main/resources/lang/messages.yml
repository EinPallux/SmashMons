player-not-found: "%prefix%&#FF6B6BPlayer &#FFFFFF%player% &#FF6B6Bwas not found."
invalid-number:   "%prefix%&#FF6B6BPlease enter a valid number."
reload-success:   "%prefix%&#6BFF6BAll configurations reloaded successfully."

