# SmashMons Language File
# ============================================
# Color guide:
#   &#FF6B6B = soft red   (errors)
#   &#6BFF6B = soft green  (success)
#   &#FFD700 = gold        (highlights / points)
#   &#D946EF = purple      (brand / augments)
#   &#44DDFF = cyan        (info)
#   &#FFFFFF = white       (values)
#   &#CCCCCC = light grey  (secondary text) — NEVER use &8 or very dark greys in chat

prefix: "&#D946EF&lSmashMons &#CCCCCC| &#FFFFFF"

# ── General ──────────────────────────────────────────────────────────────────
no-permission:    "%prefix%&#FF6B6BYou don't have permission to do that."
