# SmashMons Language File
# ============================================
# KEY RULE: Scoreboard uses Adventure Component API — hex colors work fine there.
# Chat messages use LegacyComponentSerializer — hex &#RRGGBB works in chat too.
# DO NOT use &r anywhere — it resets to dark §7.
# Every message starts with %prefix% then immediately a color code.

prefix: "&#D946EF&lSmashMons &f&#CCCCCC| &#FFFFFF"

# ── General ──────────────────────────────────────────────────────────────────
no-permission:    "%prefix%&#FF6B6BNo permission."
player-only:      "%prefix%&#FF6B6BThis command can only be used by a player."
player-not-found: "%prefix%&#FF6B6BPlayer &#FFFFFF%player% &#FF6B6Bwas not found."
invalid-number:   "%prefix%&#FF6B6BPlease enter a valid number."
reload-success:   "%prefix%&#6BFF6BConfiguration reloaded."

