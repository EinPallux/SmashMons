# SmashMons Configuration
# ========================

server-spawn:
  world: world
  x: 0.0
  y: 64.0
  z: 0.0
  yaw: 0.0
  pitch: 0.0

game:
  countdown-seconds: 60
  min-players: 2
  rounds: 4
  augment-pick-time-seconds: 20
  crystal-spawn-interval-seconds: 60
  double-jump-cooldown-seconds: 3
  double-jump-velocity: 0.8
  points-per-kill: 2
  smashcoins-multiplier: 10

crystal:
  # Item type for ultimate crystal in arena
  item: NETHER_STAR
  glow: true
  display-name: "&#FFD700&l✦ Ultimate Crystal ✦"

lobby:
  # Scoreboard settings while waiting
  show-scoreboard: true
